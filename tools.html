<!DOCTYPE html> <html lang="zh-CN"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <title>B·W CABLE - 接线大师 Pro 工业仿真平台</title> <!-- Telegram Mini App SDK --> <script src="https://telegram.org/js/telegram-web-app.js"></script> <!-- FontAwesome 图标库 --> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> <style> :root { --bg-dark: #0b0f19; --panel-bg: #151d2a; --panel-border: #2a364f; --accent-blue: #0284c7; --accent-green: #10b981; --accent-red: #ef4444; --accent-yellow: #f59e0b; --text-main: #f1f5f9; --text-muted: #94a3b8; --grid-color: #1e293b; } * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; } body { background-color: var(--bg-dark); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; } /* 顶部导航与控制栏 */ header { height: 56px; background: var(--panel-bg); border-bottom: 1px solid var(--panel-border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); } .brand { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 16px; letter-spacing: 1px; } .brand img { height: 28px; } .brand-text { background: linear-gradient(135deg, #0284c7, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; } .toolbar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; } .tool-btn { background: #1e293b; border: 1px solid var(--panel-border); color: var(--text-main); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; transition: all 0.2s; white-space: nowrap; } .tool-btn:hover { background: #334155; border-color: var(--accent-blue); } .tool-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); box-shadow: 0 0 12px rgba(2, 132, 199, 0.4); } .tool-btn.danger { background: #991b1b; border-color: #dc2626; } .tool-btn.danger:hover { background: #dc2626; } .tool-btn:disabled { opacity: 0.5; cursor: not-allowed; } /* 主界面三栏布局 */ .main-container { flex: 1; display: flex; position: relative; overflow: hidden; } /* 左侧元件库面板 */ .sidebar-left { width: 280px; background: var(--panel-bg); border-right: 1px solid var(--panel-border); display: flex; flex-direction: column; z-index: 10; } .sidebar-title { padding: 14px 16px; font-size: 14px; font-weight: bold; border-bottom: 1px solid var(--panel-border); background: linear-gradient(180deg, #1a2332, #111827); letter-spacing: 0.5px; } .search-box { padding: 10px 12px; border-bottom: 1px solid var(--panel-border); } .search-input { width: 100%; background: #0f172a; border: 1px solid var(--panel-border); color: var(--text-main); padding: 8px 12px; border-radius: 6px; font-size: 13px; outline: none; } .search-input:focus { border-color: var(--accent-blue); } .category-tabs { display: flex; overflow-x: auto; border-bottom: 1px solid var(--panel-border); background: #1a2332; scrollbar-width: thin; } .category-tabs::-webkit-scrollbar { height: 4px; } .category-tabs::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; } .tab-item { padding: 10px 14px; font-size: 12px; color: var(--text-muted); cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.2s; } .tab-item:hover { color: var(--text-main); background: rgba(255,255,255,0.03); } .tab-item.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); font-weight: bold; background: rgba(2, 132, 199, 0.1); } .component-list { flex: 1; padding: 12px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: start; } .comp-card { background: #1e293b; border: 1px solid var(--panel-border); border-radius: 8px; padding: 12px 8px; text-align: center; cursor: grab; transition: all 0.2s; position: relative; } .comp-card:hover { border-color: var(--accent-blue); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(2, 132, 199, 0.2); } .comp-card:active { cursor: grabbing; } .comp-card i { font-size: 26px; color: var(--accent-blue); margin-bottom: 8px; display: block; } .comp-card span { font-size: 11px; color: var(--text-main); display: block; line-height: 1.3; } .comp-card .comp-badge { position: absolute; top: 4px; right: 4px; background: var(--accent-red); color: white; font-size: 9px; padding: 2px 5px; border-radius: 3px; font-weight: bold; } /* 中间仿真画布 */ .canvas-viewport { flex: 1; position: relative; background-color: #0d131f; background-image: radial-gradient(circle, #1e293b 1px, transparent 1px); background-size: 20px 20px; overflow: hidden; cursor: crosshair; } #simCanvas { width: 100%; height: 100%; display: block; } .canvas-overlay { position: absolute; top: 10px; left: 10px; background: rgba(21, 29, 42, 0.9); border: 1px solid var(--panel-border); border-radius: 6px; padding: 8px 12px; font-size: 12px; color: var(--text-muted); pointer-events: none; } /* 右侧属性与参数配置面板 */ .sidebar-right { width: 300px; background: var(--panel-bg); border-left: 1px solid var(--panel-border); display: flex; flex-direction: column; z-index: 10; overflow-y: auto; } .prop-section { padding: 14px 16px; border-bottom: 1px solid var(--panel-border); } .prop-section-title { font-size: 13px; font-weight: bold; color: var(--accent-blue); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; } .prop-group { margin-bottom: 12px; } .prop-group:last-child { margin-bottom: 0; } .prop-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; display: block; } .prop-input { width: 100%; background: #0f172a; border: 1px solid var(--panel-border); color: var(--text-main); padding: 8px 10px; border-radius: 6px; font-size: 13px; outline: none; transition: border-color 0.2s; } .prop-input:focus { border-color: var(--accent-blue); } .prop-row { display: flex; gap: 8px; } .prop-row .prop-group { flex: 1; } .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; } .toggle-switch input { opacity: 0; width: 0; height: 0; } .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: 0.3s; border-radius: 24px; } .toggle-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: 0.3s; border-radius: 50%; } input:checked + .toggle-slider { background-color: var(--accent-green); } input:checked + .toggle-slider:before { transform: translateX(20px); } /* 底部状态告警栏 */ footer { height: 40px; background: #0f172a; border-top: 1px solid var(--panel-border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; font-size: 12px; gap: 20px; } .status-item { display: flex; align-items: center; gap: 8px; } .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 8px rgba(16, 185, 129, 0.5); } .status-dot.danger { background: var(--accent-red); animation: blink 0.8s infinite; box-shadow: 0 0 8px rgba(239, 68, 68, 0.5); } .status-dot.warning { background: var(--accent-yellow); animation: blink 1.2s infinite; } @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } } .status-text { color: var(--text-muted); } .status-value { color: var(--text-main); font-weight: bold; } /* 警告弹窗 */ .alert-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; } .alert-overlay.show { display: flex; } .alert-box { background: var(--panel-bg); border: 2px solid var(--accent-red); border-radius: 12px; padding: 24px; max-width: 400px; text-align: center; animation: shake 0.5s; } @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } } .alert-icon { font-size: 48px; color: var(--accent-red); margin-bottom: 16px; } .alert-title { font-size: 20px; font-weight: bold; color: var(--accent-red); margin-bottom: 8px; } .alert-message { color: var(--text-muted); margin-bottom: 20px; } .alert-btn { background: var(--accent-red); color: white; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; } /* 帮助提示 */ .help-tip { position: absolute; bottom: 10px; right: 10px; background: rgba(21, 29, 42, 0.9); border: 1px solid var(--panel-border); border-radius: 6px; padding: 8px 12px; font-size: 11px; color: var(--text-muted); pointer-events: none; } /* 滚动条样式 */ ::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-track { background: #0f172a; } ::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 4px; } ::-webkit-scrollbar-thumb:hover { background: #475569; } </style> </head> <body> <!-- 短路告警弹窗 --> <div class="alert-overlay" id="shortCircuitAlert"> <div class="alert-box"> <div class="alert-icon"><i class="fa-solid fa-triangle-exclamation"></i></div> <div class="alert-title">短路告警</div> <div class="alert-message">检测到电源 L/N 短路！请立即检查电路连接。</div> <button class="alert-btn" onclick="closeAlert()">确认</button> </div> </div> <!-- 顶部控制栏 --> <header> <div class="brand"> <img src="/logo.png" alt="Logo" onerror="this.style.display='none'"> <span class="brand-text">接线大师 Pro</span> </div> <div class="toolbar"> <button class="tool-btn" id="undoBtn" onclick="undo()" disabled title="撤销 (Ctrl+Z)"> <i class="fa-solid fa-rotate-left"></i> </button> <button class="tool-btn" id="redoBtn" onclick="redo()" disabled title="重做 (Ctrl+Y)"> <i class="fa-solid fa-rotate-right"></i> </button> <button class="tool-btn active" id="simToggleBtn" onclick="toggleSimulation()"> <i class="fa-solid fa-play"></i> 启动仿真 </button> <button class="tool-btn" onclick="toggleGrid()" id="gridBtn" title="网格开关"> <i class="fa-solid fa-border-all"></i> </button> <button class="tool-btn" onclick="toggleSnap()" id="snapBtn" title="网格吸附"> <i class="fa-solid fa-magnet"></i> </button> <button class="tool-btn" onclick="resetCanvas()" title="重置视图"> <i class="fa-solid fa-compress"></i> </button> <button class="tool-btn danger" onclick="clearCanvas()"> <i class="fa-solid fa-trash"></i> 清空 </button> </div> </header> <!-- 主界面布局 --> <div class="main-container"> <!-- 左侧元件库面板 --> <div class="sidebar-left"> <div class="sidebar-title"><i class="fa-solid fa-microchip"></i> 元件库</div> <div class="search-box"> <input type="text" class="search-input" id="compSearch" placeholder="搜索元件..." oninput="filterComponents()"> </div> <div class="category-tabs" id="categoryTabs"> <div class="tab-item active" data-category="industrial">工业低压</div> <div class="tab-item" data-category="home">家庭电路</div> <div class="tab-item" data-category="logic">逻辑门</div> <div class="tab-item" data-category="meter">仪表/电机</div> <div class="tab-item" data-category="relay">继电器</div> </div> <div class="component-list" id="componentList"> <!-- 元件卡片将由 JS 动态生成 --> </div> </div> <!-- 中间仿真画布 --> <div class="canvas-viewport" id="viewport"> <canvas id="simCanvas"></canvas> <div class="canvas-overlay" id="canvasInfo">缩放: 100% | 网格: 开 | 吸附: 开</div> <div class="help-tip">滚轮缩放 | 中键/空格+拖拽平移 | 点击元件选中 | Delete 删除</div> </div> <!-- 右侧属性参数配置栏 --> <div class="sidebar-right"> <div class="sidebar-title"><i class="fa-solid fa-sliders"></i> 参数配置</div> <div id="inspectorContent"> <div class="prop-section"> <div class="prop-section-title"><i class="fa-solid fa-circle-info"></i> 元件信息</div> <div class="prop-group"> <span class="prop-label">元件名称</span> <input type="text" class="prop-input" id="propName" value="未选择元件" readonly> </div> <div class="prop-group"> <span class="prop-label">元件类型</span> <input type="text" class="prop-input" id="propType" value="-" readonly> </div> </div> <div class="prop-section"> <div class="prop-section-title"><i class="fa-solid fa-bolt"></i> 电气参数</div> <div class="prop-group"> <span class="prop-label">额定电压 (V)</span> <input type="number" class="prop-input" id="propVoltage" value="220" onchange="updateProp()" step="1"> </div> <div class="prop-group"> <span class="prop-label">额定电流 (A)</span> <input type="number" class="prop-input" id="propCurrent" value="10" onchange="updateProp()" step="0.1"> </div> <div class="prop-group"> <span class="prop-label">功率 (kW)</span> <input type="number" class="prop-input" id="propPower" value="2.2" onchange="updateProp()" step="0.1"> </div> </div> <div class="prop-section"> <div class="prop-section-title"><i class="fa-solid fa-clock"></i> 时序控制</div> <div class="prop-group"> <span class="prop-label">延时时间 (s)</span> <input type="number" class="prop-input" id="propDelay" value="0" onchange="updateProp()" step="0.1" min="0"> </div> <div class="prop-group"> <span class="prop-label">当前状态</span> <div style="display: flex; align-items: center; gap: 10px;"> <label class="toggle-switch"> <input type="checkbox" id="propState" onchange="updateProp()"> <span class="toggle-slider"></span> </label> <span id="stateLabel" style="font-size: 13px; color: var(--text-muted);">分闸/断开</span> </div> </div> </div> <div class="prop-section"> <div class="prop-section-title"><i class="fa-solid fa-code"></i> 逻辑输入 (仅逻辑门)</div> <div class="prop-group"> <span class="prop-label">输入 A</span> <div style="display: flex; align-items: center; gap: 10px;"> <label class="toggle-switch"> <input type="checkbox" id="propInputA" onchange="updateProp()"> <span class="toggle-slider"></span> </label> <span style="font-size: 13px; color: var(--text-muted);">OFF/ON</span> </div> </div> <div class="prop-group"> <span class="prop-label">输入 B</span> <div style="display: flex; align-items: center; gap: 10px;"> <label class="toggle-switch"> <input type="checkbox" id="propInputB" onchange="updateProp()"> <span class="toggle-slider"></span> </label> <span style="font-size: 13px; color: var(--text-muted);">OFF/ON</span> </div> </div> <div class="prop-group"> <span class="prop-label">输出结果</span> <input type="text" class="prop-input" id="propOutput" value="-" readonly style="background: #1a2332;"> </div> </div> </div> </div> </div> <!-- 底部状态告警栏 --> <footer> <div class="status-item"> <div class="status-dot" id="statusDot"></div> <span class="status-text" id="statusText">系统就绪 - 电路无短路</span> </div> <div class="status-item"> <span>电源: <span class="status-value" id="sysVoltage">220V AC</span></span> </div> <div class="status-item"> <span>电流: <span class="status-value" id="sysCurrent">0.0 A</span></span> </div> <div class="status-item"> <span>元件: <span class="status-value" id="sysComponents">0</span></span> </div> </footer> <script> // ==================== 1. 初始化与配置 ==================== const tg = window.Telegram?.WebApp; if (tg) { tg.ready(); tg.expand(); if (tg.setHeaderColor) tg.setHeaderColor('#151d2a'); if (tg.setBackgroundColor) tg.setBackgroundColor('#0b0f19'); } // 画布与状态 const canvas = document.getElementById('simCanvas'); const ctx = canvas.getContext('2d'); const viewport = document.getElementById('viewport'); let isSimulating = false; let zoomLevel = 1.0; let panOffset = { x: 0, y: 0 }; let showGrid = true; let snapToGrid = true; const GRID_SIZE = 20; const SNAP_RADIUS = 15; // 元件与连线 let componentsOnBoard = []; let wiresOnBoard = []; let selectedComponent = null; let hoveredPin = null; // 撤销/重做系统 let undoStack = []; let redoStack = []; const MAX_HISTORY = 50; // 交互状态 let isDragging = false; let isPanning = false; let dragTarget = null; let dragOffset = { x: 0, y: 0 }; let panStart = { x: 0, y: 0 }; let wireStartPin = null; // 临时连线 let tempWire = null; // 音效上下文 let audioCtx = null; // ==================== 2. 元件库定义 ==================== const componentLibrary = { industrial: [ { type: 'breaker', name: '空气开关 QF', icon: 'fa-toggle-on', pins: 2, category: 'industrial' }, { type: 'contactor', name: '交流接触器 KM', icon: 'fa-box-archive', pins: 4, category: 'industrial' }, { type: 'fuse', name: '熔断器 FU', icon: 'fa-fire', pins: 2, category: 'industrial' }, { type: 'terminal', name: '接线端子 XT', icon: 'fa-circle-dot', pins: 2, category: 'industrial' } ], home: [ { type: 'switch', name: '单联开关 S', icon: 'fa-toggle-on', pins: 2, category: 'home' }, { type: 'socket', name: '五孔插座 XS', icon: 'fa-plug', pins: 2, category: 'home' }, { type: 'lamp', name: '节能灯 EL', icon: 'fa-lightbulb', pins: 2, category: 'home' }, { type: 'bell', name: '门铃 HA', icon: 'fa-bell', pins: 2, category: 'home' } ], logic: [ { type: 'and_gate', name: '与门 AND', icon: 'fa-microchip', pins: 3, category: 'logic', inputs: 2 }, { type: 'or_gate', name: '或门 OR', icon: 'fa-microchip', pins: 3, category: 'logic', inputs: 2 }, { type: 'not_gate', name: '非门 NOT', icon: 'fa-microchip', pins: 2, category: 'logic', inputs: 1 }, { type: 'nand_gate', name: '与非门 NAND', icon: 'fa-microchip', pins: 3, category: 'logic', inputs: 2 }, { type: 'nor_gate', name: '或非门 NOR', icon: 'fa-microchip', pins: 3, category: 'logic', inputs: 2 }, { type: 'xor_gate', name: '异或门 XOR', icon: 'fa-microchip', pins: 3, category: 'logic', inputs: 2 }, { type: 'xnor_gate', name: '同或门 XNOR', icon: 'fa-microchip', pins: 3, category: 'logic', inputs: 2 } ], meter: [ { type: 'motor', name: '三相电机 M', icon: 'fa-fan', pins: 3, category: 'meter' }, { type: 'ammeter', name: '电流表 PA', icon: 'fa-gauge-high', pins: 2, category: 'meter' }, { type: 'voltmeter', name: '电压表 PV', icon: 'fa-gauge', pins: 2, category: 'meter' }, { type: 'indicator', name: '指示灯 HL', icon: 'fa-lightbulb', pins: 2, category: 'meter' } ], relay: [ { type: 'time_relay', name: '时间继电器 KT', icon: 'fa-clock', pins: 4, category: 'relay' }, { type: 'intermediate_relay', name: '中间继电器 KA', icon: 'fa-circle-half-stroke', pins: 4, category: 'relay' }, { type: 'thermal_relay', name: '热继电器 FR', icon: 'fa-temperature-high', pins: 3, category: 'relay' } ] }; // ==================== 3. 初始化元件库 UI ==================== function initComponentLibrary() { const list = document.getElementById('componentList'); list.innerHTML = ''; const tabs = document.querySelectorAll('.tab-item'); tabs.forEach(tab => { tab.addEventListener('click', () => { tabs.forEach(t => t.classList.remove('active')); tab.classList.add('active'); renderComponentList(tab.dataset.category); }); }); renderComponentList('industrial'); } function renderComponentList(category) { const list = document.getElementById('componentList'); const searchTerm = document.getElementById('compSearch').value.toLowerCase(); list.innerHTML = ''; const components = componentLibrary[category] || []; components.forEach(comp => { if (comp.name.toLowerCase().includes(searchTerm) || comp.type.toLowerCase().includes(searchTerm)) { const card = document.createElement('div'); card.className = 'comp-card'; card.draggable = true; card.innerHTML = ` <i class="fa-solid ${comp.icon}"></i> <span>${comp.name}</span> `; card.addEventListener('click', () => spawnComponent(comp.type)); card.addEventListener('dragstart', (e) => { e.dataTransfer.setData('componentType', comp.type); }); list.appendChild(card); } }); } function filterComponents() { const activeTab = document.querySelector('.tab-item.active'); if (activeTab) { renderComponentList(activeTab.dataset.category); } } // ==================== 4. 画布尺寸调整 ==================== function resizeCanvas() { canvas.width = viewport.clientWidth; canvas.height = viewport.clientHeight; render(); } window.addEventListener('resize', resizeCanvas); // ==================== 5. 元件生成与管理 ==================== function spawnComponent(type) { saveStateForUndo(); const id = 'comp_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5); const template = findComponentTemplate(type); if (!template) return; const newComp = { id, type, name: template.name, icon: template.icon, x: (canvas.width / 2 - panOffset.x) / zoomLevel, y: (canvas.height / 2 - panOffset.y) / zoomLevel, width: 100, height: 80, voltage: 220, current: 10, power: 2.2, delay: 0, state: false, // 分闸/断开 inputA: false, inputB: false, outp assName = 'status-dot warning'; statusText.textContent = '仿真运行中 - 无电源输入'; } render(); } function checkShortCircuit(sourceComp) { // 简化短路检测：检查是否有两个状态为闭合的开关直接相连 const visited = new Set(); const queue = [sourceComp.id]; while (queue.length > 0) { const compId = queue.shift(); if (visited.has(compId)) continue; visited.add(compId); const comp = componentsOnBoard.find(c => c.id === compId); if (!comp || !comp.state) continue; // 检查相连元件 wiresOnBoard.forEach(wire => { let neighborId = null; if (wire.fromComp === compId) neighborId = wire.toComp; else if (wire.toComp === compId) neighborId = wire.fromComp; if (neighborId && !visited.has(neighborId)) { const neighbor = componentsOnBoard.find(c => c.id === neighborId); if (neighbor && neighbor.state && neighbor.type !== 'lamp' && neighbor.type !== 'indicator' && neighbor.type !== 'motor') { // 可能短路 shortCircuit = true; return; } queue.push(neighborId); } }); if (shortCircuit) break; } } function propagatePower() { // 简化的电能传播 const powered = new Set(); componentsOnBoard.forEach(comp => { if (comp.state && (comp.type === 'breaker' || comp.type === 'switch' || comp.type === 'contactor')) { powered.add(comp.id); comp.pins.forEach(p => p.voltage = 220); } }); // 通过连线传播 let changed = true; while (changed) { changed = false; wiresOnBoard.forEach(wire => { const fromPowered = powered.has(wire.fromComp); const toPowered = powered.has(wire.toComp); if (fromPowered && !toPowered) { const toComp = componentsOnBoard.find(c => c.id === wire.toComp); if (toComp && toComp.state) { powered.add(wire.toComp); toComp.pins.forEach(p => p.voltage = 220); wire.powered = true; changed = true; } } else if (toPowered && !fromPowered) { const fromComp = componentsOnBoard.find(c => c.id === wire.fromComp); if (fromComp && fromComp.state) { powered.add(wire.fromComp); fromComp.pins.forEach(p => p.voltage = 220); wire.powered = true; changed = true; } } }); } // 更新负载元件 componentsOnBoard.forEach(comp => { if (powered.has(comp.id) && (comp.type === 'lamp' || comp.type === 'indicator' || comp.type === 'motor')) { comp.state = true; } }); } function triggerShortCircuit() { shortCircuit = true; isSimulating = false; const btn = document.getElementById('simToggleBtn'); btn.innerHTML = '<i class="fa-solid fa-play"></i> 启动仿真'; btn.classList.remove('active'); // 显示告警 document.getElementById('shortCircuitAlert').classList.add('show'); // 状态更新 statusDot.className = 'status-dot danger'; statusText.textContent = '短路告警！电路已断开保护'; // 震动和音效 triggerHaptic('notification', 'error'); playSound('shortCircuit'); // 断开所有元件 componentsOnBoard.forEach(c => { c.state = false; c.pins.forEach(p => p.voltage = 0); }); wiresOnBoard.forEach(w => w.powered = false); render(); } function closeAlert() { document.getElementById('shortCircuitAlert').classList.remove('show'); statusText.textContent = '系统就绪 - 电路无短路'; statusDot.className = 'status-dot'; } // ==================== 11. 控制命令 ==================== function toggleGrid() { showGrid = !showGrid; document.getElementById('gridBtn').classList.toggle('active', showGrid); render(); } function toggleSnap() { snapToGrid = !snapToGrid; document.getElementById('snapBtn').classList.toggle('active', snapToGrid); render(); } function resetCanvas() { panOffset = { x: 0, y: 0 }; zoomLevel = 1.0; render(); triggerHaptic('impact'); } function clearCanvas() { if (componentsOnBoard.length === 0) return; if (confirm('确定要清空画布吗？此操作可撤销。')) { saveStateForUndo(); componentsOnBoard = []; wiresOnBoard = []; selectedComponent = null; wireStartPin = null; tempWire = null; render(); updateStatusBar(); playSound('clear'); triggerHaptic('impact'); } } function updateStatusBar() { document.getElementById('sysComponents').textContent = componentsOnBoard.length; const totalCurrent = componentsOnBoard.reduce((sum, c) => sum + (c.state ? c.current : 0), 0); document.getElementById('sysCurrent').textContent = totalCurrent.toFixed(1) + ' A'; } // ==================== 12. 音效系统 ==================== function initAudio() { if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } } function playSound(type) { try { initAudio(); if (audioCtx.state === 'suspended') audioCtx.resume(); const oscillator = audioCtx.createOscillator(); const gainNode = audioCtx.createGain(); oscillator.connect(gainNode); gainNode.connect(audioCtx.destination); switch(type) { case 'spawn': oscillator.frequency.value = 800; gainNode.gain.value = 0.1; oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.05); break; case 'connect': oscillator.frequency.value = 1000; gainNode.gain.value = 0.1; oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.08); break; case 'delete': oscillator.frequency.value = 300; gainNode.gain.value = 0.1; oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.1); break; case 'shortCircuit': oscillator.type = 'sawtooth'; oscillator.frequency.value = 150; gainNode.gain.value = 0.2; oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.3); break; case 'start': oscillator.frequency.value = 600; gainNode.gain.value = 0.1; oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.1); break; case 'undo': oscillator.frequency.value = 400; gainNode.gain.value = 0.08; oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.05); break; case 'clear': oscillator.frequency.value = 200; gainNode.gain.value = 0.1; oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.15); break; } } catch(e) { // 音频不可用 } } // ==================== 13. 震动反馈 ==================== function triggerHaptic(type, style) { if (tg && tg.HapticFeedback) { switch(type) { case 'impact': tg.HapticFeedback.impactOccurred('medium'); break; case 'notification': tg.HapticFeedback.notificationOccurred(style); break; case 'selection': tg.HapticFeedback.selectionChanged(); break; } } } // ==================== 14. 初始化 ==================== function init() { resizeCanvas(); initComponentLibrary(); // 默认开启网格和吸附 document.getElementById('gridBtn').classList.add('active'); document.getElementById('snapBtn').classList.add('active'); updateStatusBar(); // 启动渲染循环 function animationLoop() { render(); requestAnimationFrame(animationLoop); } animationLoop(); } // 启动应用 init(); </script> </body> </html>
