<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
    <title>Wiring Master · មេខ្សែភ្លើង · 接线大师</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      /* ========== CSS CUSTOM PROPERTIES ========== */
      :root {
        --blue-600: #1e69ff; --blue-700: #0052d9; --blue-900: #0a1628;
        --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
        --slate-400: #94a3b8; --slate-600: #475569; --slate-800: #1e293b;
        --slate-900: #0f172a; --slate-950: #020617;
        --green-500: #22c55e; --orange-500: #f97316;
        --red-500: #ef4444; --yellow-500: #eab308;
        --radius-sm: 10px; --radius-md: 16px; --radius-lg: 22px;
        --shadow-card: 0 4px 24px rgba(0,0,0,.12);
        --font-ui: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans Khmer",sans-serif;
      }
      * { box-sizing:border-box; margin:0; padding:0; }
      body {
        font-family: var(--font-ui); background: var(--slate-950);
        color: var(--slate-100); height: 100vh; overflow: hidden;
        display: flex; flex-direction: column;
        -webkit-tap-highlight-color: transparent;
        user-select: none; -webkit-user-select: none;
      }

      /* ========== TMA HEADER BAR ========== */
      #tmaHeader {
        height: 48px; display: flex; align-items: center; justify-content: space-between;
        padding: 0 16px; font-weight: 700; font-size: 15px; letter-spacing: .3px;
        flex-shrink: 0; z-index: 200;
        transition: background .35s, color .35s;
      }
      #tmaHeader.home { background: var(--blue-600); color: #fff; }
      #tmaHeader.sim { background: #151d2a; color: #e2e8f0; border-bottom: 1px solid #2a364f; }
      #tmaHeader.practice { background: #0f1a2e; color: #e2e8f0; border-bottom: 1px solid #1e3a5f; }

      #tmaTitle { display: flex; align-items: center; gap: 8px; }
      #tmaTitle i { font-size: 18px; }
      #headerActions { display: flex; gap: 6px; }
      .hdr-btn {
        width: 34px; height: 34px; border-radius: 50%;
        border: none; background: rgba(255,255,255,.15);
        color: inherit; font-size: 14px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background .2s;
      }
      .hdr-btn:active { background: rgba(255,255,255,.3); }

      /* ========== VIEW STACK ========== */
      .view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
      .view.active { display: flex; }

      /* ========== HOME VIEW ========== */
      #homeView {
        background: linear-gradient(180deg, var(--blue-600) 0%, var(--blue-700) 40%, var(--slate-50) 70%);
        overflow-y: auto; -webkit-overflow-scrolling: touch;
      }
      .home-hero {
        text-align: center; padding: 40px 20px 24px;
        color: #fff;
      }
      .home-hero h1 {
        font-size: 28px; font-weight: 800; letter-spacing: .5px;
        text-shadow: 0 2px 8px rgba(0,0,0,.2);
      }
      .home-hero .sub {
        font-size: 14px; opacity: .85; margin-top: 6px;
        display: flex; align-items: center; justify-content: center; gap: 6px;
      }
      /* SVG装饰 */
      .hero-svg {
        width: 120px; height: 90px; margin: 0 auto 16px;
        display: block;
      }

      /* 功能卡片网格 */
      .card-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
        padding: 0 16px 20px; max-width: 480px; margin: 0 auto;
      }
      .fn-card {
        background: #fff; border-radius: var(--radius-lg);
        padding: 20px 14px; text-align: center;
        box-shadow: var(--shadow-card); cursor: pointer;
        transition: transform .2s, box-shadow .2s;
        display: flex; flex-direction: column; align-items: center; gap: 10px;
        color: var(--slate-800);
        position: relative; overflow: hidden;
      }
      .fn-card:active { transform: scale(.96); }
      .fn-card .glow-icon {
        width: 52px; height: 52px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 24px; position: relative;
      }
      .fn-card .glow-icon.orange {
        background: #fff7ed; color: var(--orange-500);
        box-shadow: 0 0 20px rgba(249,115,22,.25);
      }
      .fn-card .glow-icon.green {
        background: #f0fdf4; color: var(--green-500);
        box-shadow: 0 0 20px rgba(34,197,94,.25);
      }
      .fn-card .glow-icon.blue {
        background: #eff6ff; color: var(--blue-600);
        box-shadow: 0 0 20px rgba(30,105,255,.25);
      }
      .fn-card .glow-icon.yellow {
        background: #fefce8; color: var(--yellow-500);
        box-shadow: 0 0 20px rgba(234,179,8,.25);
      }
      .fn-card .card-title { font-size: 15px; font-weight: 700; }
      .fn-card .card-desc { font-size: 11px; color: var(--slate-400); line-height: 1.4; }

      /* 页脚 */
      .home-footer {
        text-align: center; padding: 16px 20px 30px;
        font-size: 11px; color: var(--slate-400);
      }
      .home-footer a { color: var(--blue-600); text-decoration: none; }

      /* ========== SETTINGS PANEL ========== */
      .settings-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,.55);
        z-index: 500; display: none; align-items: flex-end; justify-content: center;
      }
      .settings-overlay.show { display: flex; }
      .settings-sheet {
        background: #fff; border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        width: 100%; max-width: 480px; padding: 24px 20px 36px;
        animation: slideUp .3s ease-out; color: var(--slate-800);
      }
      @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
      .settings-sheet h3 { font-size: 18px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
      .setting-row {
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px 0; border-bottom: 1px solid var(--slate-200);
      }
      .setting-label { font-size: 14px; font-weight: 600; }
      .lang-chips { display: flex; gap: 6px; }
      .lang-chip {
        padding: 6px 14px; border-radius: 20px; border: 2px solid var(--slate-200);
        font-size: 12px; font-weight: 600; cursor: pointer; background: #fff;
        transition: all .2s;
      }
      .lang-chip.active { border-color: var(--blue-600); background: #eff6ff; color: var(--blue-600); }
      .toggle-sw {
        position: relative; display: inline-block; width: 48px; height: 26px;
      }
      .toggle-sw input { opacity: 0; width: 0; height: 0; }
      .toggle-slider {
        position: absolute; cursor: pointer; inset: 0;
        background: var(--slate-400); border-radius: 26px; transition: .3s;
      }
      .toggle-slider:before {
        position: absolute; content: ""; height: 20px; width: 20px;
        left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s;
      }
      input:checked + .toggle-slider { background: var(--green-500); }
      input:checked + .toggle-slider:before { transform: translateX(22px); }
      .settings-close {
        width: 100%; margin-top: 20px; padding: 12px;
        background: var(--blue-600); color: #fff; border: none;
        border-radius: var(--radius-sm); font-size: 15px; font-weight: 700;
        cursor: pointer;
      }

      /* ========== SIM VIEW ========== */
      #simView { background: var(--slate-950); }
      .sim-toolbar {
        height: 44px; display: flex; align-items: center; gap: 6px;
        padding: 0 10px; background: #151d2a; border-bottom: 1px solid #2a364f;
        overflow-x: auto; flex-shrink: 0;
      }
      .sim-toolbar::-webkit-scrollbar { height: 0; }
      .tb-btn {
        height: 32px; padding: 0 10px; border-radius: 6px;
        border: 1px solid #2a364f; background: #1e293b;
        color: var(--slate-100); font-size: 12px; cursor: pointer;
        display: flex; align-items: center; gap: 5px;
        white-space: nowrap; transition: all .2s;
      }
      .tb-btn:active { background: #334155; }
      .tb-btn.accent { background: var(--blue-600); border-color: var(--blue-600); }
      .tb-btn.danger { background: #7f1d1d; border-color: #991b1b; }
      .tb-btn.active-btn { background: var(--green-500); border-color: var(--green-500); color: #000; }

      .sim-main {
        flex: 1; display: flex; position: relative; overflow: hidden;
      }
      /* 元件面板 */
      .comp-panel {
        width: 260px; background: #151d2a; border-right: 1px solid #2a364f;
        display: flex; flex-direction: column; flex-shrink: 0;
        transition: transform .25s; z-index: 10;
      }
      .comp-panel.collapsed { transform: translateX(-100%); position: absolute; height: 100%; }
      .comp-panel-header {
        padding: 10px 12px; font-size: 13px; font-weight: 700;
        border-bottom: 1px solid #2a364f; background: #111827;
      }
      .comp-grid {
        flex: 1; padding: 10px; overflow-y: auto;
        display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-content: start;
      }
      .comp-item {
        background: #1e293b; border: 1px solid #2a364f; border-radius: 8px;
        padding: 10px 6px; text-align: center; cursor: pointer;
        transition: all .2s;
      }
      .comp-item:active { border-color: var(--blue-600); transform: scale(.95); }
      .comp-item i { font-size: 22px; color: var(--blue-600); display: block; margin-bottom: 6px; }
      .comp-item span { font-size: 10px; color: var(--slate-100); line-height: 1.3; }

      /* 画布 */
      .canvas-wrap { flex: 1; position: relative; overflow: hidden; }
      #simCanvas { width: 100%; height: 100%; display: block; }
      .canvas-info {
        position: absolute; top: 8px; left: 8px;
        background: rgba(21,29,42,.85); border: 1px solid #2a364f;
        border-radius: 6px; padding: 4px 10px; font-size: 11px;
        color: var(--slate-400); pointer-events: none;
      }
      /* 短路闪烁层 */
      .short-flash {
        position: absolute; inset: 0; pointer-events: none;
        background: rgba(239,68,68,0); transition: background .15s;
        z-index: 50;
      }
      .short-flash.active { background: rgba(239,68,68,.25); }

      /* 告警弹窗 */
      .alert-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,.7);
        z-index: 600; display: none; align-items: center; justify-content: center;
      }
      .alert-overlay.show { display: flex; }
      .alert-box {
        background: #151d2a; border: 2px solid var(--red-500);
        border-radius: 16px; padding: 28px; max-width: 340px;
        text-align: center; animation: shake .5s;
      }
      @keyframes shake {
        0%,100% { transform: translateX(0); }
        25% { transform: translateX(-8px); }
        75% { transform: translateX(8px); }
      }
      .alert-box i { font-size: 44px; color: var(--red-500); margin-bottom: 14px; }
      .alert-box h4 { font-size: 18px; color: var(--red-500); margin-bottom: 6px; }
      .alert-box p { font-size: 13px; color: var(--slate-400); margin-bottom: 18px; }
      .alert-box button {
        background: var(--red-500); color: #fff; border: none;
        padding: 10px 28px; border-radius: 8px; font-size: 14px; font-weight: 700;
        cursor: pointer;
      }

      /* ========== PRACTICE VIEW ========== */
      #practiceView { background: #0d1320; overflow-y: auto; -webkit-overflow-scrolling: touch; }
      .practice-header {
        background: linear-gradient(180deg, #0f1a2e 0%, #0d1320 100%);
        padding: 20px 16px; text-align: center; border-bottom: 1px solid #1e3a5f;
      }
      .practice-header h2 { font-size: 20px; font-weight: 700; }
      .practice-header p { font-size: 12px; color: var(--slate-400); margin-top: 4px; }
      .practice-list { padding: 14px 16px 30px; max-width: 480px; margin: 0 auto; }
      .exercise-card {
        background: #151d2a; border: 1px solid #2a364f; border-radius: var(--radius-md);
        padding: 16px; margin-bottom: 12px; cursor: pointer;
        display: flex; align-items: center; gap: 14px;
        transition: all .2s;
      }
      .exercise-card:active { border-color: var(--blue-600); }
      .ex-badge {
        width: 44px; height: 44px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; flex-shrink: 0;
      }
      .ex-badge.easy { background: #f0fdf4; color: var(--green-500); }
      .ex-badge.medium { background: #eff6ff; color: var(--blue-600); }
      .ex-badge.hard { background: #fff7ed; color: var(--orange-500); }
      .ex-info { flex: 1; }
      .ex-info h4 { font-size: 14px; margin-bottom: 2px; }
      .ex-info span { font-size: 11px; color: var(--slate-400); }
      .ex-info .stars { color: var(--yellow-500); font-size: 12px; margin-top: 3px; }
      .ex-arrow { color: var(--slate-600); font-size: 18px; }

      /* 通用滚动条 */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

      /* 响应式 */
      @media (max-width: 420px) {
        .card-grid { gap: 10px; padding: 0 10px 16px; }
        .fn-card { padding: 16px 10px; }
      }
    </style>
  </head>
  <body>
    <!-- TMA Header -->
    <div id="tmaHeader" class="home">
      <div id="tmaTitle"><i class="fa-solid fa-bolt"></i><span>接线大师</span></div>
      <div id="headerActions">
        <button class="hdr-btn" id="btnLang" title="语言"><i class="fa-solid fa-globe"></i></button>
        <button class="hdr-btn" id="btnSettings" title="设置"><i class="fa-solid fa-gear"></i></button>
      </div>
    </div>

    <!-- ====== HOME VIEW ====== -->
    <div class="view active" id="homeView">
      <div class="home-hero">
        <!-- 工业配电箱SVG装饰 -->
        <svg class="hero-svg" viewBox="0 0 120 90">
          <rect x="10" y="5" width="100" height="80" rx="6" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.3)" stroke-width="2"/>
          <rect x="20" y="15" width="35" height="25" rx="3" fill="rgba(255,255,255,.2)"/>
          <circle cx="37" cy="27" r="5" fill="none" stroke="#fff" stroke-width="1.5"/>
          <rect x="65" y="15" width="35" height="25" rx="3" fill="rgba(255,255,255,.2)"/>
          <rect x="20" y="48" width="35" height="25" rx="3" fill="rgba(255,255,255,.2)"/>
          <circle cx="37" cy="60" r="5" fill="#22c55e" stroke="#fff" stroke-width="1.5"/>
          <rect x="65" y="48" width="35" height="25" rx="3" fill="rgba(255,255,255,.2)"/>
          <line x1="60" y1="28" x2="65" y2="28" stroke="#fff" stroke-width="1.5"/>
          <line x1="60" y1="60" x2="65" y2="60" stroke="#fff" stroke-width="1.5"/>
        </svg>
        <h1>接线大师</h1>
        <div class="sub">Wiring Master · មេខ្សែភ្លើង</div>
      </div>

      <div class="card-grid">
        <div class="fn-card" onclick="navTo('sim','home220v')">
          <div class="glow-icon orange"><i class="fa-solid fa-house-chimney"></i></div>
          <div class="card-title" data-i18n="home220v">家庭电路</div>
          <div class="card-desc" data-i18n="home220vDesc">220V 单相自由接线</div>
        </div>
        <div class="fn-card" onclick="navTo('sim','industrial380v')">
          <div class="glow-icon green"><i class="fa-solid fa-industry"></i></div>
          <div class="card-title" data-i18n="industrial380v">工业电路</div>
          <div class="card-desc" data-i18n="industrial380vDesc">380V 三相自由接线</div>
        </div>
        <div class="fn-card" onclick="navTo('practice')">
          <div class="glow-icon blue"><i class="fa-solid fa-graduation-cap"></i></div>
          <div class="card-title" data-i18n="practiceMode">接线练习</div>
          <div class="card-desc" data-i18n="practiceModeDesc">标准电路模拟训练</div>
        </div>
        <div class="fn-card" onclick="openSettings()">
          <div class="glow-icon yellow"><i class="fa-solid fa-sliders"></i></div>
          <div class="card-title" data-i18n="settings">我的设置</div>
          <div class="card-desc" data-i18n="settingsDesc">语言 · 声音 · 震动</div>
        </div>
      </div>

      <div class="home-footer">
        v2.0 · Wiring Master<br/>
        <span data-i18n="support">技术支持</span>: cableweb@bdwm.co
      </div>
    </div>

    <!-- ====== SIM VIEW ====== -->
    <div class="view" id="simView">
      <div class="sim-toolbar" id="simToolbar">
        <button class="tb-btn" onclick="navTo('home')"><i class="fa-solid fa-arrow-left"></i></button>
        <span id="simModeLabel" style="font-size:13px;font-weight:700;margin:0 6px;white-space:nowrap;">家庭电路</span>
        <button class="tb-btn" id="simToggleBtn" onclick="toggleSimulation()"><i class="fa-solid fa-play"></i> <span data-i18n="startSim">启动仿真</span></button>
        <button class="tb-btn" onclick="undo()" id="undoBtn" disabled><i class="fa-solid fa-rotate-left"></i></button>
        <button class="tb-btn danger" onclick="clearCanvas()"><i class="fa-solid fa-trash"></i></button>
        <button class="tb-btn" onclick="toggleCompPanel()"><i class="fa-solid fa-box"></i></button>
        <button class="tb-btn" onclick="zoomFit()"><i class="fa-solid fa-compress"></i></button>
      </div>
      <div class="sim-main">
        <div class="comp-panel" id="compPanel">
          <div class="comp-panel-header"><i class="fa-solid fa-microchip"></i> <span data-i18n="components">元件库</span></div>
          <div class="comp-grid" id="compGrid"></div>
        </div>
        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="simCanvas"></canvas>
          <div class="short-flash" id="shortFlash"></div>
          <div class="canvas-info" id="canvasInfo">Zoom: 100% | Grid: ON</div>
        </div>
      </div>
    </div>

    <!-- 短路告警弹窗 -->
    <div class="alert-overlay" id="shortAlert">
      <div class="alert-box">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <h4 data-i18n="shortCircuit">短路告警</h4>
        <p data-i18n="shortCircuitMsg">检测到电源短路！请立即检查电路连接。</p>
        <button onclick="closeAlert()" data-i18n="confirm">确认</button>
      </div>
    </div>

    <!-- ====== PRACTICE VIEW ====== -->
    <div class="view" id="practiceView">
      <div class="practice-header">
        <button class="tb-btn" onclick="navTo('home')" style="margin-bottom:12px;"><i class="fa-solid fa-arrow-left"></i> <span data-i18n="back">返回</span></button>
        <h2 data-i18n="practiceModeTitle">接线练习</h2>
        <p data-i18n="practiceModeSub">标准电路模拟训练 · Standard Circuit Drills</p>
      </div>
      <div class="practice-list" id="practiceList"></div>
    </div>

    <!-- ====== SETTINGS OVERLAY ====== -->
    <div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
      <div class="settings-sheet">
        <h3><i class="fa-solid fa-gear"></i> <span data-i18n="settings">我的设置</span></h3>
        <div class="setting-row">
          <span class="setting-label" data-i18n="language">语言 / Language / ភាសា</span>
          <div class="lang-chips" id="langChips">
            <button class="lang-chip active" data-lang="zh">中文</button>
            <button class="lang-chip" data-lang="en">EN</button>
            <button class="lang-chip" data-lang="km">ខ្មែរ</button>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label" data-i18n="sound">声音效果</span>
          <label class="toggle-sw"><input type="checkbox" id="soundToggle" checked onchange="updateSettings()"><span class="toggle-slider"></span></label>
        </div>
        <div class="setting-row">
          <span class="setting-label" data-i18n="vibration">触觉震动</span>
          <label class="toggle-sw"><input type="checkbox" id="vibeToggle" checked onchange="updateSettings()"><span class="toggle-slider"></span></label>
        </div>
        <button class="settings-close" onclick="closeSettings()" data-i18n="close">关闭</button>
      </div>
    </div>
    <script>
// ====== TMA INIT ======
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ====== GLOBAL STATE ======
let currentView = 'home';
let currentMode = 'home220v'; // 'home220v' | 'industrial380v'
let lang = 'zh';             // 'zh' | 'en' | 'km'
let soundOn = true;
let vibeOn = true;

// ====== I18N DICTIONARY ======
const i18n = {
  home220v:       { zh:'家庭电路', en:'Home 220V', km:'សៀគ្វីផ្ទះ' },
  home220vDesc:   { zh:'220V 单相自由接线', en:'220V Single-Phase Wiring', km:'ខ្សែ ២២០V មួយហ្វាស' },
  industrial380v: { zh:'工业电路', en:'Industrial 380V', km:'សៀគ្វីឧស្សាហកម្ម' },
  industrial380vDesc:{ zh:'380V 三相自由接线', en:'380V Three-Phase Wiring', km:'ខ្សែ ៣៨០V បីហ្វាស' },
  practiceMode:   { zh:'接线练习', en:'Practice Mode', km:'លំហាត់ខ្សែ' },
  practiceModeDesc:{ zh:'标准电路模拟训练', en:'Standard Circuit Drills', km:'លំហាត់សៀគ្វីស្តង់ដារ' },
  settings:       { zh:'我的设置', en:'Settings', km:'ការកំណត់' },

function t(key) { return (i18n[key] && i18n[key][lang]) || key; }
function applyI18N() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');

  });

    { zh:'接线大师', en:'Wiring Master', km:'មេខ្សែភ្លើង' }[lang] || '接线大师';
  updateSimModeLabel();
}

// ====== HAPTIC & AUDIO ======
let audioCtx = null;
function initAudio() { if (!audioCtx) { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } }
function beep(freq, dur, vol=.08, type='sine') {
  if (!soundOn) return;
  try { initAudio(); if (audioCtx.state==='suspended') audioCtx.resume();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type=type; o.frequency.value=freq; g.gain.value=vol;
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+dur);
  } catch(e){}
}
function haptic(style) {
  if (!vibeOn || !tg?.HapticFeedback) return;
  if (style==='impact') tg.HapticFeedback.impactOccurred('medium');
  else if (style==='success') tg.HapticFeedback.notificationOccurred('success');
  else if (style==='error') tg.HapticFeedback.notificationOccurred('error');
  else if (style==='warning') tg.HapticFeedback.notificationOccurred('warning');
  else if (style==='light') tg.HapticFeedback.impactOccurred('light');
}

function navTo(view, mode) {
  currentView = view;
  if (mode) currentMode = mode;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const target = document.getElementById(view+'View');
  if (target) target.classList.add('active');

  const hdr = document.getElementById('tmaHeader');
  hdr.className = (view==='home') ? 'home' : (view==='practice') ? 'practice' : 'sim';
  if (tg?.setHeaderColor) {
    tg.setHeaderColor(view==='home' ? '#1e69ff' : '#151d2a');
  }
  updateSimModeLabel();
  if (view==='sim') { resizeCanvas(); render(); }
  if (view==='practice') renderPracticeList();
}

function updateSimModeLabel() {
  const lbl = document.getElementById('simModeLabel');

// ====== SIM CANVAS ENGINE ======
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const canvasWrap = document.getElementById('canvasWrap');
let zoomLevel = 1.0;
let panOffset = { x:0, y:0 };
let showGrid = true;
const GRID_SIZE = 20;
const PIN_SNAP_RADIUS = 15;
let isSimulating = false;
let components = [];
let wires = [];
let selectedComp = null;
let undoStack = [], redoStack = [];
const MAX_HISTORY = 30;
let isDragging = false, isPanning = false;
let dragTarget = null, dragOff = { x:0, y:0 };
let panStart = { x:0, y:0 };
let wireStart = null, tempWire = null;
let hoveredPin = null;

// Component definitions
const COMP_LIB = {
  home220v: [
    { type:'breaker1p', name:{ zh:'单极空开 QF', en:'1P Breaker', km:'ឧបករណ៍' }, icon:'fa-toggle-on', pins:2, cat:'home', v:220 },
    { type:'switch1p', name:{ zh:'单联开关 S', en:'1P Switch', km:'កុងតាក់' }, icon:'fa-toggle-off', pins:2, cat:'home', v:220 },
    { type:'socket', name:{ zh:'插座 XS', en:'Socket', km:'រន្ធ' }, icon:'fa-plug', pins:2, cat:'home', v:220 },
    { type:'lamp', name:{ zh:'节能灯 EL', en:'Lamp', km:'អំពូល' }, icon:'fa-lightbulb', pins:2, cat:'home', v:220 },
    { type:'bell', name:{ zh:'门铃 HA', en:'Bell', km:'កណ្តឹង' }, icon:'fa-bell', pins:2, cat:'home', v:220 },
    { type:'indicator', name:{ zh:'指示灯 HL', en:'Indicator', km:'ភ្លើងសញ្ញា' }, icon:'fa-lightbulb', pins:2, cat:'home', v:220 },
  ],
  industrial380v: [
    { type:'breaker3p', name:{ zh:'三相空开 QF', en:'3P Breaker', km:'ឧបករណ៍3ហ្វាស' }, icon:'fa-toggle-on', pins:3, cat:'industrial', v:380 },
    { type:'contactor', name:{ zh:'交流接触器 KM', en:'Contactor', km:'កុងតាក់ទ័រ' }, icon:'fa-box-archive', pins:3, cat:'industrial', v:380 },
    { type:'thermal_relay', name:{ zh:'热继电器 FR', en:'Thermal Relay', km:'រ៉េឡេកម្តៅ' }, icon:'fa-temperature-high', pins:3, cat:'industrial', v:380 },
    { type:'motor3p', name:{ zh:'三相电机 M', en:'3P Motor', km:'ម៉ូទ័រ3ហ្វាស' }, icon:'fa-fan', pins:3, cat:'industrial', v:380 },
    { type:'fuse', name:{ zh:'熔断器 FU', en:'Fuse', km:'ហ្វុយស៍' }, icon:'fa-fire', pins:2, cat:'industrial', v:380 },
    { type:'indicator380', name:{ zh:'指示灯 HL', en:'Indicator', km:'ភ្លើងសញ្ញា' }, icon:'fa-lightbulb', pins:2, cat:'industrial', v:380 },
  ]
};

function getCompName(comp) { return (comp.name && comp.name[lang]) || comp.name?.zh || comp.type; }

function renderComponentPanel() {
  const grid = document.getElementById('compGrid');
  const lib = COMP_LIB[currentMode] || COMP_LIB['home220v'];
  grid.innerHTML = '';
  lib.forEach(c => {
    const div = document.createElement('div');
    div.className = 'comp-item';
    div.innerHTML = `<i class="fa-solid ${c.icon}"></i><span>${getCompName(c)}</span>`;
    div.addEventListener('click', () => { spawnComponent(c.type); haptic('impact'); beep(800,.05); });
    grid.appendChild(div);
  });
}

function findTemplate(type) {
  for (const mode in COMP_LIB) {
    const f = COMP_LIB[mode].find(c => c.type===type);
    if (f) return f;
  }
  return null;
}

function spawnComponent(type) {
  saveUndo();
  const tpl = findTemplate(type); if (!tpl) return;
  const id = 'c'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
  const comp = {
    id, type, name:tpl.name, icon:tpl.icon, pins:[],
    x:(canvas.width/2 - panOffset.x)/zoomLevel,
    y:(canvas.height/2 - panOffset.y)/zoomLevel,
    w:110, h:90, voltage:tpl.v||220, current:10, state:false
  };
  // generate pins
  const pinPositions = {
    2:[{rx:30,ry:0},{rx:70,ry:0},{rx:30,ry:90},{rx:70,ry:90}],
    3:[{rx:50,ry:0},{rx:20,ry:80},{rx:80,ry:80}],
    4:[{rx:20,ry:0},{rx:80,ry:0},{rx:20,ry:80},{rx:80,ry:80}]
  };
  const positions = pinPositions[Math.min(tpl.pins,4)] || pinPositions[2];
  for (let i=0; i<tpl.pins; i++) {
    comp.pins.push({ id:comp.id+'_p'+i, label:'P'+(i+1), rx:positions[i].rx, ry:positions[i].ry, voltage:0 });
  }
  components.push(comp);
  selectComponent(comp);
  render(); updateStatus();
}

function selectComponent(comp) { selectedComp = comp; render(); }
function deleteSelected() {
  if (!selectedComp) return;
  saveUndo();
  wires = wires.filter(w => w.fromC !== selectedComp.id && w.toC !== selectedComp.id);
  components = components.filter(c => c.id !== selectedComp.id);
  selectedComp = null;
  beep(300,.1); haptic('impact');
  render(); updateStatus();
}

// ====== UNDO/REDO ======
function saveUndo() {
  undoStack.push({ components:JSON.parse(JSON.stringify(components)), wires:JSON.parse(JSON.stringify(wires)) });
  if (undoStack.length > MAX_HISTORY) undoStack.shift();
  redoStack = [];
  document.getElementById('undoBtn').disabled = false;
}
function undo() {
  if (undoStack.length===0) return;
  redoStack.push({ components:JSON.parse(JSON.stringify(components)), wires:JSON.parse(JSON.stringify(wires)) });
  const st = undoStack.pop();
  components = st.components; wires = st.wires;
  selectedComp = null;
  document.getElementById('undoBtn').disabled = undoStack.length===0;
  beep(400,.05); render(); updateStatus();
}
function clearCanvas() {
  if (components.length===0) return;
  if (!confirm(t('clearConfirm'))) return;
  saveUndo();
  components = []; wires = []; selectedComp = null; wireStart = null; tempWire = null;
  beep(200,.15); haptic('impact');
  render(); updateStatus();
}

// ====== CANVAS RENDERING ======
function resizeCanvas() {
  const w = canvasWrap.clientWidth;
  const h = canvasWrap.clientHeight;
  if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; }
  render();
}

function render() {
  if (!ctx || currentView!=='sim') return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(panOffset.x, panOffset.y);
  ctx.scale(zoomLevel, zoomLevel);

  if (showGrid) drawGrid();

  // draw wires
  wires.forEach(w => drawWire(w));
  if (tempWire) drawTempWire();

  // draw components
  components.forEach(c => drawComponent(c));

  if (hoveredPin && wireStart) drawSnapIndicator(hoveredPin);

  ctx.restore();

  document.getElementById('canvasInfo').textContent =
    `Zoom: ${Math.round(zoomLevel*100)}% | Grid: ${showGrid?'ON':'OFF'} | ${t('components')}: ${components.length}`;
}

function drawGrid() {
  ctx.strokeStyle = '#1e293b'; ctx.lineWidth = .5;
  const sx = Math.floor(-panOffset.x/zoomLevel/GRID_SIZE)*GRID_SIZE;
  const sy = Math.floor(-panOffset.y/zoomLevel/GRID_SIZE)*GRID_SIZE;
  const ex = sx + canvas.width/zoomLevel + GRID_SIZE*2;
  const ey = sy + canvas.height/zoomLevel + GRID_SIZE*2;
  ctx.beginPath();
  for (let x=sx; x<ex; x+=GRID_SIZE) { ctx.moveTo(x,sy); ctx.lineTo(x,ey); }
  for (let y=sy; y<ey; y+=GRID_SIZE) { ctx.moveTo(sx,y); ctx.lineTo(ex,y); }
  ctx.stroke();
}

function drawWire(w) {
  ctx.beginPath();
  ctx.moveTo(w.x1, w.y1);
  ctx.bezierCurveTo(w.x1, w.y1+50, w.x2, w.y2-50, w.x2, w.y2);
  ctx.lineWidth = isSimulating ? 5 : 3.5;
  ctx.strokeStyle = isSimulating && w.powered ? '#22c55e' : '#1e69ff';
  if (isSimulating && w.powered) {
    ctx.shadowColor = '#22c55e'; ctx.shadowBlur = 12;
  } else { ctx.shadowBlur = 0; }
  ctx.stroke();
  ctx.shadowBlur = 0;
  // endpoints
  [{x:w.x1,y:w.y1},{x:w.x2,y:w.y2}].forEach(pt => {
    ctx.beginPath(); ctx.arc(pt.x,pt.y,5,0,Math.PI*2); ctx.fillStyle = ctx.strokeStyle; ctx.fill();
  });
}

function drawTempWire() {
  ctx.beginPath(); ctx.moveTo(tempWire.x1,tempWire.y1); ctx.lineTo(tempWire.x2,tempWire.y2);
  ctx.strokeStyle = '#eab308'; ctx.lineWidth = 2; ctx.setLineDash([5,5]); ctx.stroke(); ctx.setLineDash([]);
}

function drawComponent(comp) {
  const sel = selectedComp && selectedComp.id===comp.id;
  const powered = isSimulating && comp.state;
  ctx.shadowColor = powered ? 'rgba(34,197,94,.5)' : 'transparent';
  ctx.shadowBlur = powered ? 14 : 0;
  ctx.fillStyle = sel ? '#1e3a5f' : (powered ? '#1a3a2a' : '#151d2a');
  ctx.strokeStyle = sel ? '#1e69ff' : (powered ? '#22c55e' : '#334155');
  ctx.lineWidth = sel ? 3 : 2;
  roundRect(ctx, comp.x, comp.y, comp.w, comp.h, 8);
  ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;

  // icon + name
  ctx.fillStyle = powered ? '#22c55e' : '#f1f5f9';
  ctx.font = 'bold 11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(getCompName(comp), comp.x+comp.w/2, comp.y+comp.h/2);

  // pins
  comp.pins.forEach((p,i) => {
    const px = comp.x + p.rx, py = comp.y + p.ry;
    const hovered = hoveredPin && hoveredPin.id===p.id;
    const live = isSimulating && p.voltage>0;
    ctx.beginPath(); ctx.arc(px,py,hovered?8:6,0,Math.PI*2);
    ctx.fillStyle = live ? '#22c55e' : (hovered ? '#eab308' : '#ef4444');
    ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 7px sans-serif';
    ctx.fillText(i+1, px, py);
  });

  // motor animation
  if (comp.type==='motor3p' && isSimulating && comp.state) {
    const cx=comp.x+comp.w/2, cy=comp.y+comp.h/2, t=Date.now()/80;
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(t);
    ctx.strokeStyle='#22c55e'; ctx.lineWidth=2;
    for (let i=0;i<3;i++) { ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(18,0); ctx.stroke(); ctx.rotate(Math.PI*2/3); }
    ctx.restore();
  }
}

function drawSnapIndicator(pin) {
  ctx.beginPath(); ctx.arc(pin.x, pin.y, PIN_SNAP_RADIUS, 0, Math.PI*2);
  ctx.strokeStyle='#eab308'; ctx.lineWidth=2; ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
}

function roundRect(c, x,y,w,h,r) {
  c.beginPath(); c.moveTo(x+r,y); c.lineTo(x+w-r,y);
  c.quadraticCurveTo(x+w,y,x+w,y+r); c.lineTo(x+w,y+h-r);
  c.quadraticCurveTo(x+w,y+h,x+w-r,y+h); c.lineTo(x+r,y+h);
  c.quadraticCurveTo(x,y+h,x,y+h-r); c.lineTo(x,y+r);
  c.quadraticCurveTo(x,y,x+r,y); c.closePath();
}

// ====== INTERACTION ======
canvas.addEventListener('mousedown', e => {
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX-r.left - panOffset.x)/zoomLevel;
  const my = (e.clientY-r.top - panOffset.y)/zoomLevel;

  if (e.button===1 || (e.button===0 && e.shiftKey)) {
    isPanning=true; panStart={x:e.clientX-panOffset.x, y:e.clientY-panOffset.y};
    canvas.style.cursor='grabbing'; e.preventDefault(); return;
  }

  if (e.button===0) {
    const pinHit = findPinAt(mx,my);
    if (pinHit && wireStart) {
      createWire(wireStart, pinHit); wireStart=null; tempWire=null; beep(1000,.08); haptic('success'); return;
    } else if (pinHit) {
      wireStart=pinHit; tempWire={x1:pinHit.x,y1:pinHit.y,x2:mx,y2:my}; canvas.style.cursor='crosshair'; return;
    }
    const compHit = findCompAt(mx,my);
    if (compHit) { isDragging=true; dragTarget=compHit; dragOff={x:mx-compHit.x, y:my-compHit.y}; selectComponent(compHit); }
    else { selectComponent(null); wireStart=null; tempWire=null; }
  }
});
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX-r.left - panOffset.x)/zoomLevel;
  const my = (e.clientY-r.top - panOffset.y)/zoomLevel;
  if (isPanning) { panOffset.x=e.clientX-panStart.x; panOffset.y=e.clientY-panStart.y; render(); return; }
  if (isDragging && dragTarget) {
    dragTarget.x = Math.round(mx - dragOff.x);
    dragTarget.y = Math.round(my - dragOff.y);
    render(); return;
  }
  if (tempWire) { tempWire.x2=mx; tempWire.y2=my; render(); return; }
  hoveredPin = findPinAt(mx,my);
  canvas.style.cursor = hoveredPin ? 'pointer' : 'crosshair';
  if (hoveredPin) render();
});
window.addEventListener('mouseup', () => {
  isDragging=false; isPanning=false; dragTarget=null;
  canvas.style.cursor = wireStart ? 'crosshair' : 'crosshair';
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX-r.left, my = e.clientY-r.top;
  const zf = e.deltaY>0 ? .9 : 1.1;
  const nz = Math.max(.15, Math.min(5, zoomLevel*zf));
  const wx = (mx-panOffset.x)/zoomLevel, wy = (my-panOffset.y)/zoomLevel;
  zoomLevel = nz;
  panOffset.x = mx - wx*zoomLevel; panOffset.y = my - wy*zoomLevel;
  render();
});
// Touch support for mobile
canvas.addEventListener('touchstart', e => {
  if (e.touches.length===2) { isPanning=true; panStart={x:0,y:0}; return; }
  const t = e.touches[0];
  const mx = (t.clientX-canvas.getBoundingClientRect().left-panOffset.x)/zoomLevel;
  const my = (t.clientY-canvas.getBoundingClientRect().top-panOffset.y)/zoomLevel;
  const pinHit = findPinAt(mx,my);
  if (pinHit && wireStart) { createWire(wireStart,pinHit); wireStart=null; tempWire=null; beep(1000,.08); haptic('success'); e.preventDefault(); return; }
  else if (pinHit) { wireStart=pinHit; tempWire={x1:pinHit.x,y1:pinHit.y,x2:mx,y2:my}; return; }
  const compHit = findCompAt(mx,my);
  if (compHit) { isDragging=true; dragTarget=compHit; dragOff={x:mx-compHit.x, y:my-compHit.y}; selectComponent(compHit); }
});
canvas.addEventListener('touchmove', e => {
  if (e.touches.length===2) { e.preventDefault(); return; }
  if (isDragging && dragTarget) {
    const t = e.touches[0];
    const mx = (t.clientX-canvas.getBoundingClientRect().left-panOffset.x)/zoomLevel;
    const my = (t.clientY-canvas.getBoundingClientRect().top-panOffset.y)/zoomLevel;
    dragTarget.x = Math.round(mx - dragOff.x); dragTarget.y = Math.round(my - dragOff.y);
    render(); e.preventDefault();
  }
  if (tempWire) {
    const t = e.touches[0];
    tempWire.x2 = (t.clientX-canvas.getBoundingClientRect().left-panOffset.x)/zoomLevel;
    tempWire.y2 = (t.clientY-canvas.getBoundingClientRect().top-panOffset.y)/zoomLevel;
    render(); e.preventDefault();
  }
});
canvas.addEventListener('touchend', () => { isDragging=false; isPanning=false; dragTarget=null; });

// Keyboard
document.addEventListener('keydown', e => {
  if (currentView!=='sim') return;
  if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); undo(); }
  else if (e.key==='Delete'||e.key==='Backspace') {
    if (selectedComp && document.activeElement===document.body) { e.preventDefault(); deleteSelected(); }
  }
});

function findPinAt(x,y) {
  for (const comp of components) {
    for (const pin of comp.pins) {
      const px = comp.x+pin.rx, py = comp.y+pin.ry;
      if (Math.sqrt((x-px)**2+(y-py)**2) < PIN_SNAP_RADIUS/zoomLevel) {
        return { ...pin, x:px, y:py, compId:comp.id, comp };
      }
    }
  }
  return null;
}
function findCompAt(x,y) {
  return components.find(c => x>=c.x && x<=c.x+c.w && y>=c.y && y<=c.y+c.h);
}
function createWire(from, to) {
  if (from.compId===to.compId) return;
  saveUndo();
  wires.push({
    id:'w'+Date.now(), fromC:from.compId, fromP:from.id, toC:to.compId, toP:to.id,
    x1:from.x, y1:from.y, x2:to.x, y2:to.y, powered:false
  });
  render(); updateStatus();
}

// ====== SIMULATION ======
function toggleSimulation() {
  isSimulating = !isSimulating;
  const btn = document.getElementById('simToggleBtn');
  if (isSimulating) {
    btn.innerHTML = '<i class="fa-solid fa-pause"></i> '+t('stopSim');
    btn.classList.add('active-btn');
    haptic('success'); beep(600,.1);
    analyzeCircuit();
  } else {
    btn.innerHTML = '<i class="fa-solid fa-play"></i> '+t('startSim');
    btn.classList.remove('active-btn');
    wires.forEach(w => w.powered=false);
    components.forEach(c => { c.state=false; c.pins.forEach(p=>p.voltage=0); });
    render();
  }
}

function analyzeCircuit() {
  if (!isSimulating) return;
  // reset
  wires.forEach(w => w.powered=false);
  components.forEach(c => { c.state=false; c.pins.forEach(p=>p.voltage=0); });

  // find power sources (closed breakers/switches) and propagate
  const sources = components.filter(c => c.state && (c.type==='breaker1p'||c.type==='breaker3p'||c.type==='switch1p'));
  if (sources.length===0) { render(); return; }

  // BFS power propagation
  const energized = new Set(sources.map(s => s.id));
  sources.forEach(s => s.pins.forEach(p => p.voltage = s.voltage));

  let changed = true;
  while (changed) {
    changed = false;
    wires.forEach(w => {
      const fromPow = energized.has(w.fromC);
      const toPow = energized.has(w.toC);
      if (fromPow && !toPow) {
        const tc = components.find(c => c.id===w.toC);
        if (tc && tc.state) {
          energized.add(w.toC); w.powered=true;
          tc.pins.forEach(p => p.voltage = tc.voltage);
          changed=true;
          // check for load activation
          if (tc.type==='lamp'||tc.type==='indicator'||tc.type==='indicator380'||tc.type==='motor3p') tc.state=true;
        }
      } else if (toPow && !fromPow) {
        const fc = components.find(c => c.id===w.fromC);
        if (fc && fc.state) {
          energized.add(w.fromC); w.powered=true;
          fc.pins.forEach(p => p.voltage = fc.voltage);
          changed=true;
          if (fc.type==='lamp'||fc.type==='indicator'||fc.type==='indicator380'||fc.type==='motor3p') fc.state=true;
        }
      }
    });
  }

  // Short circuit detection: any energized source has a wire path to another energized source
  // Simplified: check if two different breaker sources are energized and connected via wires
  const sourceIds = sources.filter(s => energized.has(s.id)).map(s => s.id);
  let short = false;
  if (sourceIds.length >= 2) {
    // Check connectivity between sources via wires
    const adj = {}; wires.forEach(w => { (adj[w.fromC]=adj[w.fromC]||[]).push(w.toC); (adj[w.toC]=adj[w.toC]||[]).push(w.fromC); });
    const visited = new Set();
    const dfs = (id) => { visited.add(id); (adj[id]||[]).forEach(n => { if (!visited.has(n)) dfs(n); }); };
    dfs(sourceIds[0]);
    for (let i=1;i<sourceIds.length;i++) { if (visited.has(sourceIds[i])) { short=true; break; } }
  }

  if (short) {
    triggerShortCircuit();
  } else {
    render();
  }
}

function triggerShortCircuit() {
  isSimulating = false;
  const btn = document.getElementById('simToggleBtn');
  btn.innerHTML = '<i class="fa-solid fa-play"></i> '+t('startSim');
  btn.classList.remove('active-btn');
  document.getElementById('shortAlert').classList.add('show');
  document.getElementById('shortFlash').classList.add('active');
  setTimeout(() => document.getElementById('shortFlash').classList.remove('active'), 600);
  haptic('error'); beep(150,.3,'sawtooth');
  wires.forEach(w => w.powered=false);
  components.forEach(c => { c.state=false; c.pins.forEach(p=>p.voltage=0); });
  render();
}

function closeAlert() {
  document.getElementById('shortAlert').classList.remove('show');
}
